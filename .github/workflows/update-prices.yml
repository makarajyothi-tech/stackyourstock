name: Update stock prices daily

on:
  schedule:
    # 9:30 AM IST = 04:00 UTC (IST has no daylight saving, so this is fixed year-round)
    - cron: "0 4 * * *"
  # Lets you trigger it manually from the Actions tab to test without waiting for the schedule
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price updater
        run: python scripts/update_prices.py

      - name: Commit and push if index.html changed
        run: |
          git config user.name "stackyourstock-bot"
          git config user.email "actions@github.com"
          if git diff --quiet index.html; then
            echo "No changes to commit."
          else
            git add index.html
            git commit -m "Auto-update stock prices [skip ci]"
            git push
          fi
